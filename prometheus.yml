global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - 'demo-rest:8080'           # Web-порт основного сервиса
        - 'analytics-service:8080'    # Web-порт (Spring Boot по умолчанию)
        - 'audit-service:8082'       # Web-порт аудита
        - 'notification-service:8080' # Web-порт уведомлений