syntax = "proto3";

package edu.rutmiit.demo.grpc;

option java_multiple_files = true;
option java_package = "edu.rutmiit.demo.grpc";
option java_outer_classname = "AnalyticsServiceProto";

service AnalyticsService {
  rpc CalculateUserRating (UserRatingRequest) returns (UserRatingResponse);
}

message UserRatingRequest {
  int64 user_id = 1;
  string category = 2;
}

message UserRatingResponse {
  int64 user_id = 1;
  int32 rating_score = 2;
  string verdict = 3;
}